name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          SMS_DELAY: 60
          TIP_DELAY: 120
          POLL_INTERVAL: 5
          DATABASE_URL: test.db
          LOG_FILE: logs/messages.log
        run: pytest tests/ -v
